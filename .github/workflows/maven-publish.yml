# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  push: 
    branches: main

jobs:
  maven:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        cache: 'maven'

    - name: Build with Maven
      run: mvn -B package --file pom.xml
      
    - name: Upload artifact for Docker job
      uses: actions/upload-artifact@v4
      with:
        name: java-app
        path: '${{ github.workspace }}/target/*.jar'

  docker:

    runs-on: ubuntu-latest
    needs: maven
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Download artifact from maven job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      - name: Logging in to Docker
        run: docker login ghcr.io -u BalazsMartonZoltan -p ${{ github.token }}
      - name: Build the docker image
        run: docker build . --file Dockerfile --tag ghcr.io/balazsmartonzoltan/cubix/1/homework/app:springboot
      - name: publishing the docker image
        run: docker push ghcr.io/balazsmartonzoltan/cubix/1/homework/app:springboot

  verify:

    runs-on: ubuntu-latest
    needs: docker
    permissions: 
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: make script executable
        run: chmod +x verify-image.sh
      - name: verify docker image
        run: ./verify-image.sh
